<!doctype html>
<html lang="en">
  <head>
    <!-- Start Single Page Apps for GitHub Pages -->
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <!-- End Single Page Apps for GitHub Pages -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TapInvite</title>
    <link rel="icon" type="image/png" href="/logotapinvite.png" />
    <meta property="og:title" content="Gabriel Faz 25 - Churrasco de Aniversário" />
    <meta property="og:description" content="Você está convidado para o churrasco de aniversário do Gabriel! 20 de Março em Campo Grande, RJ. Confirme sua presença!" />
    <meta property="og:image" content="https://tapinvite.github.io/bday.png" />
    <meta property="og:url" content="https://tapinvite.github.io/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Gabriel Faz 25 - Churrasco de Aniversário" />
    <meta name="twitter:description" content="Você está convidado para o churrasco de aniversário do Gabriel! 20 de Março em Campo Grande, RJ." />
    <meta name="twitter:image" content="https://tapinvite.github.io/bday.png" />
    <style>
      #global-error {
        display: none;
        background: #220000;
        color: #ffaaaa;
        padding: 20px;
        font-family: monospace;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 9999;
        white-space: pre-wrap;
      }
    </style>
    <script>
      window.addEventListener('error', function(event) {
        var errorDiv = document.getElementById('global-error');
        if (errorDiv) {
          errorDiv.style.display = 'block';
          errorDiv.innerHTML += 'Error: ' + event.message + '\nAt: ' + event.filename + ':' + event.lineno + '\n\n';
        }
      });
      window.addEventListener('unhandledrejection', function(event) {
        var errorDiv = document.getElementById('global-error');
        if (errorDiv) {
          errorDiv.style.display = 'block';
          errorDiv.innerHTML += 'Unhandled Promise Rejection: ' + (event.reason && event.reason.message ? event.reason.message : event.reason) + '\n\n';
        }
      });
    </script>
  </head>
  <body>
    <div id="global-error"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
